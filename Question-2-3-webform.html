<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Feedback form</title>
    <style>
      .control, fieldset { margin: 6px 0; }
      label { display: inline-block; width: 120px; vertical-align: top; }
      input + label { width: auto; }
      .error, .required { color: red; }
      fieldset ul { margin: 0; }
    </style>
  </head>
  <body>
    <h1>Feedback form</h1>

    <!-- FIX: add id so script can prepend errors here and manage focus -->
    <form id="feedbackForm" action="" method="get" novalidate>
      <div class="control">
        <!-- FIX: connect label to input via for/id -->
        <label for="name">Full name <span class="required">*</span></label>
        <input id="name" name="name" type="text" />
      </div>

      <div class="control">
        <label for="biography">Biography</label>
        <textarea id="biography" name="biography"></textarea>
        <span>Include examples on your skills in JavaScript.</span>
      </div>

      <!-- FIX: use fieldset + legend for grouped radios -->
      <fieldset class="control" id="gender_group">
        <legend>Gender</legend>
        <input id="gender_male" name="gender" type="radio" value="male" />
        <label for="gender_male">Male</label>
        <br />
        <input id="gender_female" name="gender" type="radio" value="female" />
        <label for="gender_female">Female</label>
      </fieldset>

      <div class="control">
        <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1" />
        <label for="accept_agbs">I accept the terms and conditions</label>
      </div>

      <div class="control">
        <!-- This param is what the script checks to trigger validation -->
        <input name="validate" type="hidden" value="1" />
        <input id="submitBtn" type="submit" value="Register" />
      </div>
    </form>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"
            integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
            crossorigin="anonymous"></script>

    <script>
      "use strict";

      (function () {
        var validateInput;

        
        $.urlParam = function (name) {
          var results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);
          if (results === null) {
            return null;
          } else {
            return decodeURI(results[1]) || null;
          }
        };

        validateInput = function validateInput(input, message) {
          var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;

          $input = $('[name="' + input + '"]');

          
          if ((value = $.urlParam(input)) === null) {

            // Create the top errors fieldset once
            if ($('fieldset.errors').length === 0) {
             
              $('form').prepend(
                '<fieldset class="errors" role="alert" aria-live="assertive" tabindex="-1">' +
                  '<legend>Errors</legend><ul></ul>' +
                '</fieldset>'
              );
            }

            $referencedElement = null;
            $elementToDescribe = null;
            $errorContainer = $('fieldset.errors ul');

            if ($input.is(':radio')) {
              
              $fieldset = $input.closest('fieldset');
              $elementToDescribe = $fieldset.length ? $fieldset : $input;
              $referencedElement = $input.filter(':first');
            } else {
              $elementToDescribe = $input;
              $referencedElement = $input;
            }

            
            // R.G. hint: fix next line ;)
         
            if (!$referencedElement.attr('id')) {
              $referencedElement.attr('id', input + '_field');
            }
            var targetId = $referencedElement.attr('id');

            // Added aria-describedby so SRs read the error with the field
            $elementToDescribe.attr('aria-describedby', input + '_description');

            // Builded the error link and error text node id
            $error = $('<a></a>')
              .attr('href', '#' + targetId)
              .addClass('error')
              .text(message);

       
            $error.on('click', function (e) {
              e.preventDefault();
              document.getElementById(targetId).focus();
            });

            var $li = $('<li></li>').append($error);
            $errorContainer.append($li);

            
            if ($('#' + input + '_description').length === 0) {
              $('<span></span>')
                .attr('id', input + '_description')
                .addClass('error')
                .css({ position: 'absolute', left: '-9999px' }) // visually hidden without extra CSS file
                .text(message)
                .appendTo('body');
            }

         
            if ($(':not(form):focus').length === 0) {
              var $summary = $('fieldset.errors').first();
              // setTimeout helps some browsers move focus reliably after DOM changes
              setTimeout(function () { $summary.focus(); }, 0);
            }

          } else {
            
            if ($input.is(':checkbox')) {
              $input.prop('checked', true);
            }
            if ($input.is(':radio')) {
              return $input.filter('[value="' + value + '"]').prop('checked', true);
            } else {
              return $input.val(value);
            }
          }
        };

        $(document).ready(function () {
         
          $('#feedbackForm').on('submit', function (e) {
            e.preventDefault();

           
            $('fieldset.errors').remove();
            $('[aria-describedby]').each(function(){ $(this).removeAttr('aria-describedby'); });

            var params = new URLSearchParams();
            params.set('validate', '1');

          
            var name = $('#name').val().trim();
            var biography = $('#biography').val().trim();
            var gender = $('input[name="gender"]:checked').val(); // undefined if none
            var terms = $('#accept_agbs').is(':checked') ? '1' : null;

            if (name) params.set('name', name);
            if (biography) params.set('biography', biography);
            if (gender) params.set('gender', gender);
            if (terms) params.set('accept_agbs', '1');

            
            var newUrl = window.location.pathname + '?' + params.toString();
            window.history.replaceState({}, '', newUrl);

            
            runValidation();
          });

          function runValidation() {
            if ($.urlParam('validate')) {
              validateInput('name', 'Please enter your name!');
              validateInput('biography', 'Please tell us something about your history!');
              validateInput('gender', 'Please tell us your gender!');
              validateInput('accept_agbs', 'You must accept our terms and conditions!');

             
              if ($('fieldset.errors li').length === 0) {
                alert('All inputs are valid.');
                
                $('h1').focus().attr('tabindex','-1');
              }
            }
          }

          
          runValidation();
        });
      }).call(void 0);
    </script>
  </body>
</html>
